name: Question
description: Ask a question or request help with using the SGDynamicTextAssets plugin.
labels: ["question", "help wanted"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A brief summary of your question.
      placeholder: "Example: How do I load a DTA asynchronously at runtime?"
    validations:
      required: true

  - type: textarea
    id: what-trying
    attributes:
      label: What are you trying to do?
      description: |
        Describe what you are trying to accomplish.
      placeholder: |
        Example: I want to load weapon configuration DTAs in the background during
        a loading screen so the game thread is not blocked.
    validations:
      required: true

  - type: textarea
    id: what-tried
    attributes:
      label: What have you tried?
      description: |
        Describe any approaches you have already attempted or documentation you have already read (optional).
      placeholder: |
        Example: I tried calling USGDynamicTextAssetSubsystem::LoadDynamicTextAsset directly
        from an async task, but I'm not sure if it's thread-safe. I also read the
        AsyncLoadingAndThreading.md doc but I'm still unclear on the correct approach.

  - type: input
    id: ue-version
    attributes:
      label: Unreal Engine Version
      description: The version of Unreal Engine you are using (optional).
      placeholder: "Example: 5.6"

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: The version of SGDynamicTextAssets you are using (optional).
      placeholder: "Example: 1.0"
